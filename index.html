<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Grammar Cards</title>
<style>
  :root {
    --bg: #f2f2f7;
    --card: #ffffff;
    --text: #1c1c1e;
    --text-secondary: #3c3c43;
    --text-muted: #8e8e93;
    --separator: rgba(60,60,67,0.12);
    --blue: #007aff;
    --blue-bg: #f0f6ff;
    --green: #34c759;
    --green-bg: #f0fff4;
    --orange: #ff9500;
    --orange-bg: #fff8f0;
    --purple: #af52de;
    --radius-card: 20px;
    --radius-inner: 12px;
    --shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.04);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  /* ── Header ── */
  header {
    background: rgba(255,255,255,0.82);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--separator);
    padding: 48px 24px 32px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .eyebrow {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 8px;
  }

  header h1 {
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1.1;
  }

  .header-sub {
    margin-top: 10px;
    font-size: 15px;
    color: var(--text-muted);
    font-weight: 400;
    letter-spacing: -0.01em;
  }

  /* ── Content wrapper ── */
  .content { max-width: 720px; margin: 0 auto; padding: 32px 20px 80px; }

  /* ── Meta strip ── */
  .meta-strip {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .topic-tag {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--blue);
    color: white;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.01em;
    padding: 6px 14px;
    border-radius: 999px;
  }

  .series-tag {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    background: white;
    border: 1px solid var(--separator);
    padding: 6px 14px;
    border-radius: 999px;
  }

  /* ── Progress ── */
  .progress-block { margin-bottom: 28px; }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .progress-track {
    height: 4px;
    background: var(--separator);
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 999px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }

  /* ── Syllabus ── */
  .syllabus-block { margin-bottom: 32px; }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 10px;
  }

  .syllabus-scroll {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .syllabus-chip {
    flex-shrink: 0;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 999px;
    background: white;
    color: var(--text-muted);
    border: 1px solid var(--separator);
    white-space: nowrap;
  }

  .syllabus-chip.active {
    background: var(--blue);
    color: white;
    border-color: transparent;
    font-weight: 600;
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border-radius: var(--radius-card);
    box-shadow: var(--shadow);
    margin-bottom: 20px;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(0,0,0,0.09), 0 12px 40px rgba(0,0,0,0.06);
  }

  .card-top {
    padding: 20px 22px 18px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1px solid var(--separator);
  }

  .card-num {
    min-width: 36px;
    height: 36px;
    border-radius: 10px;
    background: var(--blue);
    color: white;
    font-size: 15px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: -0.02em;
    margin-top: 1px;
  }

  .card-subtopic {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    letter-spacing: -0.02em;
    padding-top: 4px;
  }

  .card-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 16px; }

  /* ── Blocks inside card ── */
  .block { border-radius: var(--radius-inner); padding: 16px 18px; }

  .block-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .block-text {
    font-size: 15px;
    line-height: 1.7;
    letter-spacing: -0.01em;
  }

  .block-pre {
    font-family: inherit;
    font-size: 15px;
    line-height: 1.75;
    letter-spacing: -0.01em;
    white-space: pre-wrap;
  }

  .rule { background: var(--blue-bg); }
  .rule .block-label { color: var(--blue); }
  .rule .block-text { color: #0a3055; }

  .example { background: var(--green-bg); }
  .example .block-label { color: #1a7f3c; }
  .example .block-pre { color: #0d4a25; }

  .practice { background: var(--orange-bg); }
  .practice .block-label { color: #b06000; }
  .practice .block-text { color: #5a3000; }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 24px;
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: -0.01em;
  }

  /* ── States ── */
  .state-box {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }
  .state-icon { font-size: 48px; margin-bottom: 16px; }
  .state-box h2 { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 8px; letter-spacing: -0.02em; }
  .state-box p { font-size: 15px; }

  @media (max-width: 480px) {
    header { padding: 36px 20px 24px; }
    .card-top { padding: 18px 18px 16px; }
    .card-body { padding: 16px 18px; }
    .block { padding: 14px 16px; }
    .block-text, .block-pre { font-size: 14px; }
    .card-subtopic { font-size: 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">English Grammar</div>
  <h1>Daily Cards</h1>
  <div class="header-sub" id="date-display">Loading&hellip;</div>
</header>

<div class="content">

  <div class="meta-strip">
    <div class="topic-tag" id="topic-tag">&#8203;</div>
    <div class="series-tag" id="series-tag">&#8203;</div>
  </div>

  <div class="syllabus-block">
    <div class="section-title">Syllabus</div>
    <div class="syllabus-scroll" id="syllabus"></div>
  </div>

  <div class="progress-block">
    <div class="progress-label">
      <span>Today's Cards</span>
      <span id="card-count">0 of 10</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="cards">
    <div class="state-box">
      <div class="state-icon">&#8987;</div>
      <h2>Loading cards&hellip;</h2>
      <p>Fetching your daily grammar lesson</p>
    </div>
  </div>

</div>

<footer>Daily Grammar Cards &middot; Free for students</footer>

<script>
const SYLLABUS = [
  "Narration","Articles & Prepositions","Voice Change","Tenses",
  "Adverbs","Clauses","Sentence Types","Phrasal Verbs",
  "Parts of Speech","Degrees of Comparison","Sentence Transformation"
];

const ICONS = {
  "Narration":"🗣️","Articles & Prepositions":"📌","Voice Change":"🔄",
  "Tenses":"⏰","Adverbs":"💨","Clauses":"🔗","Sentence Types":"📝",
  "Phrasal Verbs":"🏃","Parts of Speech":"🔤","Degrees of Comparison":"📊",
  "Sentence Transformation":"✂️"
};

function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d){
  return new Date(d+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
}

function renderSyllabus(active){
  document.getElementById('syllabus').innerHTML = SYLLABUS.map(t=>
    `<div class="syllabus-chip${t===active?' active':''}">${esc(t)}</div>`
  ).join('');
}

function renderCard(c){
  return `
  <article class="card">
    <div class="card-top">
      <div class="card-num">${c.id}</div>
      <div class="card-subtopic">${esc(c.subtopic)}</div>
    </div>
    <div class="card-body">
      <div class="block rule">
        <div class="block-label">Rule</div>
        <div class="block-text">${esc(c.rule)}</div>
      </div>
      <div class="block example">
        <div class="block-label">Example</div>
        <pre class="block-pre">${esc(c.example)}</pre>
      </div>
      <div class="block practice">
        <div class="block-label">Practice</div>
        <div class="block-text">${esc(c.practice)}</div>
      </div>
    </div>
  </article>`;
}

async function load(){
  try {
    const r = await fetch('cards.json?v='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();

    document.getElementById('date-display').textContent = fmtDate(d.date);
    document.getElementById('topic-tag').textContent = (ICONS[d.topic]||'📖')+' '+d.topic;
    document.getElementById('series-tag').textContent = 'Series '+d.series;

    renderSyllabus(d.topic);

    const n = d.cards.length;
    document.getElementById('card-count').textContent = n+' of 10';
    document.getElementById('progress-fill').style.width = (n*10)+'%';

    document.getElementById('cards').innerHTML = d.cards.length
      ? d.cards.map(renderCard).join('')
      : `<div class="state-box"><div class="state-icon">📭</div><h2>No cards today</h2><p>Check back soon!</p></div>`;

  } catch(e){
    document.getElementById('cards').innerHTML =
      `<div class="state-box"><div class="state-icon">⚠️</div><h2>Could not load cards</h2><p>${esc(e.message)}</p></div>`;
  }
}

load();
</script>
</body>
</html>
