<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily Grammar Cards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700;900&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f0efeb;
    --card:    #ffffff;
    --text:    #111111;
    --muted:   #666666;
    --blue:    #2563ff;
    --purple:  #7c3aed;
    --green:   #00b37e;
    --orange:  #ff6b2b;
    --yellow:  #f5c400;
    --pink:    #ff3d8b;
    --radius:  20px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lato', 'Hind Siliguri', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* ── HEADER ─────────────────────────────────── */
  header {
    position: relative;
    padding: 56px 24px 48px;
    text-align: center;
    background: #111;
    overflow: hidden;
  }

  .header-blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.55;
    animation: blobFloat 8s ease-in-out infinite alternate;
  }
  .blob1 { width: 400px; height: 400px; background: var(--blue);   top: -120px; left: -80px;  animation-delay: 0s; }
  .blob2 { width: 350px; height: 350px; background: var(--purple); top: -80px;  right: -60px; animation-delay: 2s; }
  .blob3 { width: 280px; height: 280px; background: var(--pink);   bottom: -80px; left: 30%;  animation-delay: 4s; }

  @keyframes blobFloat {
    0%   { transform: scale(1)   translate(0, 0); }
    100% { transform: scale(1.15) translate(20px, -20px); }
  }

  .header-inner { position: relative; z-index: 2; max-width: 720px; margin: 0 auto; }

  .eyebrow {
    display: inline-block;
    font-family: 'Lato', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 16px;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 4px 14px;
    border-radius: 999px;
  }

  header h1 {
    font-family: 'Lato', sans-serif;
    font-size: clamp(42px, 9vw, 80px);
    font-weight: 900;
    color: #ffffff;
    line-height: 1.0;
    letter-spacing: -0.04em;
    margin-bottom: 6px;
    animation: titlePop 0.7s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes titlePop {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  .title-accent {
    background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header-sub {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 16px;
    font-weight: 500;
    color: rgba(255,255,255,0.65);
    margin-top: 14px;
    letter-spacing: 0.01em;
  }

  #date-display {
    display: inline-block;
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: rgba(255,255,255,0.5);
    margin-top: 10px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  /* ── CONTENT ─────────────────────────────────── */
  .content { max-width: 720px; margin: 0 auto; padding: 32px 20px 100px; }

  /* ── META BAR ────────────────────────────────── */
  .meta-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .topic-tag {
    font-family: 'Lato', sans-serif;
    font-size: 13px;
    font-weight: 900;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: var(--text);
    color: #fff;
    padding: 8px 18px;
    border-radius: 999px;
  }

  .series-tag {
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    background: white;
    border: 2px solid #e0e0e0;
    padding: 6px 14px;
    border-radius: 999px;
    letter-spacing: 0.03em;
    text-transform: uppercase;
  }

  /* ── SYLLABUS ─────────────────────────────────── */
  .syllabus-block { margin-bottom: 28px; }

  .section-label {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .syllabus-pills { display: flex; flex-wrap: wrap; gap: 7px; }

  .s-pill {
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    font-weight: 700;
    padding: 5px 13px;
    border-radius: 999px;
    background: white;
    color: #999;
    border: 2px solid #e8e8e8;
    transition: all 0.2s;
  }
  .s-pill.active {
    background: var(--text);
    color: white;
    border-color: var(--text);
    transform: scale(1.05);
  }

  /* ── PROGRESS ─────────────────────────────────── */
  .progress-block { margin-bottom: 36px; }

  .progress-top {
    display: flex;
    justify-content: space-between;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .progress-track {
    height: 8px;
    background: #ddd;
    border-radius: 999px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--purple), var(--pink));
    background-size: 200% 100%;
    border-radius: 999px;
    transition: width 0.8s cubic-bezier(.4,0,.2,1);
    animation: gradientSlide 3s linear infinite;
  }

  @keyframes gradientSlide {
    0%   { background-position: 0% 50%; }
    100% { background-position: 200% 50%; }
  }

  /* ── CARDS ────────────────────────────────────── */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06), 0 8px 32px rgba(0,0,0,0.05);
    opacity: 0;
    transform: translateY(28px);
    animation: cardIn 0.55s cubic-bezier(.22,1,.36,1) forwards;
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .card:hover {
    box-shadow: 0 8px 32px rgba(0,0,0,0.13), 0 24px 64px rgba(0,0,0,0.08);
    transform: translateY(-3px);
  }

  @keyframes cardIn {
    to { opacity: 1; transform: translateY(0); }
  }

  /* stagger delays */
  .card:nth-child(1) { animation-delay: 0.05s; }
  .card:nth-child(2) { animation-delay: 0.12s; }
  .card:nth-child(3) { animation-delay: 0.19s; }
  .card:nth-child(4) { animation-delay: 0.26s; }
  .card:nth-child(5) { animation-delay: 0.33s; }

  .card-top-bar {
    height: 6px;
    background: linear-gradient(90deg, var(--blue), var(--purple));
  }
  .card:nth-child(2) .card-top-bar { background: linear-gradient(90deg, var(--purple), var(--pink)); }
  .card:nth-child(3) .card-top-bar { background: linear-gradient(90deg, var(--green), var(--blue)); }
  .card:nth-child(4) .card-top-bar { background: linear-gradient(90deg, var(--orange), var(--yellow)); }
  .card:nth-child(5) .card-top-bar { background: linear-gradient(90deg, var(--pink), var(--orange)); }

  .card-header {
    padding: 20px 22px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1.5px solid #f0f0f0;
  }

  .card-num {
    min-width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--text);
    color: white;
    font-family: 'Lato', sans-serif;
    font-size: 16px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    letter-spacing: -0.03em;
  }
  .card:nth-child(1) .card-num { background: linear-gradient(135deg, var(--blue), var(--purple)); }
  .card:nth-child(2) .card-num { background: linear-gradient(135deg, var(--purple), var(--pink)); }
  .card:nth-child(3) .card-num { background: linear-gradient(135deg, var(--green), #00d4aa); }
  .card:nth-child(4) .card-num { background: linear-gradient(135deg, var(--orange), var(--yellow)); }
  .card:nth-child(5) .card-num { background: linear-gradient(135deg, var(--pink), var(--orange)); }

  .card-subtopic {
    font-family: 'Lato', sans-serif;
    font-size: 18px;
    font-weight: 900;
    color: var(--text);
    line-height: 1.25;
    letter-spacing: -0.02em;
    padding-top: 6px;
  }

  /* ── BLOCKS ───────────────────────────────────── */
  .card-body { padding: 20px 22px; display: flex; flex-direction: column; gap: 14px; }

  .block { border-radius: 14px; padding: 16px 18px; }

  .block-label {
    font-family: 'Lato', sans-serif;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .block-text {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.85;
  }

  .block-pre {
    font-family: 'Hind Siliguri', sans-serif;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.9;
    white-space: pre-wrap;
  }

  .rule   { background: #eef2ff; }
  .rule   .block-label { color: var(--blue); }
  .rule   .block-text  { color: #1e3a8a; }

  .example   { background: #f0fdf4; }
  .example   .block-label { color: var(--green); }
  .example   .block-pre  { color: #14532d; }

  .practice   { background: #fff7ed; }
  .practice   .block-label { color: var(--orange); }
  .practice   .block-text  { color: #7c2d12; }

  /* ── FOOTER ───────────────────────────────────── */
  footer {
    text-align: center;
    padding: 32px 20px;
    font-family: 'Lato', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #aaa;
  }

  /* ── STATES ───────────────────────────────────── */
  .state-box {
    text-align: center;
    padding: 80px 20px;
  }
  .state-icon { font-size: 52px; margin-bottom: 16px; }
  .state-box h2 {
    font-family: 'Lato', sans-serif;
    font-size: 24px;
    font-weight: 900;
    letter-spacing: -0.03em;
    margin-bottom: 8px;
  }
  .state-box p { font-size: 15px; color: var(--muted); }

  @media (max-width: 480px) {
    .card-header { padding: 16px 16px 14px; }
    .card-body   { padding: 16px; }
    .block       { padding: 14px 15px; }
    .card-subtopic { font-size: 16px; }
    .block-text, .block-pre { font-size: 15px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-blob blob1"></div>
  <div class="header-blob blob2"></div>
  <div class="header-blob blob3"></div>
  <div class="header-inner">
    <div class="eyebrow">English Grammar · বাংলায়</div>
    <h1>Daily <span class="title-accent">Grammar</span><br>Cards</h1>
    <div class="header-sub" id="date-display">লোড হচ্ছে…</div>
  </div>
</header>

<div class="content">

  <div class="meta-bar">
    <div class="topic-tag" id="topic-tag">⏳</div>
    <div class="series-tag" id="series-tag">⏳</div>
  </div>

  <div class="syllabus-block">
    <div class="section-label">Syllabus Topics</div>
    <div class="syllabus-pills" id="syllabus"></div>
  </div>

  <div class="progress-block">
    <div class="progress-top">
      <span>আজকের কার্ড</span>
      <span id="card-count">— of 5</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill" style="width:0%"></div>
    </div>
  </div>

  <div id="cards">
    <div class="state-box">
      <div class="state-icon">⏳</div>
      <h2>লোড হচ্ছে…</h2>
      <p>আজকের গ্রামার কার্ড আনা হচ্ছে</p>
    </div>
  </div>

</div>

<footer>Daily Grammar Cards &middot; For Students of West Bengal (India)</footer>

<script>
const SYLLABUS = [
  "Narration","Articles & Prepositions","Voice Change","Tenses",
  "Adverbs","Clauses","Sentence Types","Phrasal Verbs",
  "Parts of Speech","Degrees of Comparison","Sentence Transformation"
];

const ICONS = {
  "Narration":"🗣️","Articles & Prepositions":"📌","Voice Change":"🔄",
  "Tenses":"⏰","Adverbs":"💨","Clauses":"🔗","Sentence Types":"📝",
  "Phrasal Verbs":"🏃","Parts of Speech":"🔤","Degrees of Comparison":"📊",
  "Sentence Transformation":"✂️"
};

function esc(s){
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d){
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  return new Date(d+'T00:00:00').toLocaleDateString('bn-BD', opts);
}

function renderSyllabus(active){
  document.getElementById('syllabus').innerHTML = SYLLABUS.map(t=>
    `<div class="s-pill${t===active?' active':''}">${esc(t)}</div>`
  ).join('');
}

function renderCard(c){
  return `
  <article class="card">
    <div class="card-top-bar"></div>
    <div class="card-header">
      <div class="card-num">${c.id}</div>
      <div class="card-subtopic">${esc(c.subtopic)}</div>
    </div>
    <div class="card-body">
      <div class="block rule">
        <div class="block-label">📋 নিয়ম</div>
        <div class="block-text">${esc(c.rule)}</div>
      </div>
      <div class="block example">
        <div class="block-label">✅ উদাহরণ</div>
        <pre class="block-pre">${esc(c.example)}</pre>
      </div>
      <div class="block practice">
        <div class="block-label">✏️ অনুশীলন</div>
        <div class="block-text">${esc(c.practice)}</div>
      </div>
    </div>
  </article>`;
}

async function load(){
  try {
    const r = await fetch('cards.json?v='+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d = await r.json();

    document.getElementById('date-display').textContent = fmtDate(d.date);
    document.getElementById('topic-tag').textContent = (ICONS[d.topic]||'📖')+' '+d.topic;
    document.getElementById('series-tag').textContent = 'Series '+d.series;

    renderSyllabus(d.topic);

    const n = d.cards.length;
    document.getElementById('card-count').textContent = n+' of 5';
    document.getElementById('progress-fill').style.width = (n*20)+'%';

    document.getElementById('cards').innerHTML = d.cards && d.cards.length
      ? d.cards.map(renderCard).join('')
      : `<div class="state-box"><div class="state-icon">📭</div><h2>আজ কোনো কার্ড নেই</h2><p>পরে আবার চেক করুন!</p></div>`;

  } catch(e){
    document.getElementById('cards').innerHTML =
      `<div class="state-box"><div class="state-icon">⚠️</div><h2>লোড করা সম্ভব হয়নি</h2><p>${esc(e.message)}</p></div>`;
  }
}

load();
</script>
</body>
</html>
